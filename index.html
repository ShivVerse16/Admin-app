    <style>
        body { background-color: #f8fafc; color: #334155; padding-bottom: 90px; }
        .input-box { width: 100%; background: #f1f5f9; border: 2px solid transparent; padding: 12px 16px; border-radius: 12px; font-weight: 500; font-size: 14px; outline: none; }

        .hidden-force { display: none !important; }
        .login-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid white; }
        .cat-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .cat-card:hover { transform: translateY(-5px); border-color: #4f46e5; }
        .cat-icon { width: 40px; height: 40px; background: #eef2ff; color: #4f46e5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .cat-item { padding: 10px; font-size: 12px; font-weight: 600; text-align: center; border-radius: 8px; background: #f8fafc; color: #64748b; cursor: pointer; }

        function getClient(name) {
            const conf = DB_CONFIG[name];
            return { client: supabase.createClient(conf.url, conf.key), table: conf.table };
        }

        let booksCache = [];

        window.onload = () => { if(sessionStorage.getItem("auth")==="true") { document.getElementById('view-login').classList.add('hidden-force'); document.getElementById('main-app').classList.remove('hidden-force'); initApp(); } };
        function checkLogin() { if(document.getElementById('login-pass').value==="Prince16@") { sessionStorage.setItem("auth","true"); location.reload(); } else document.getElementById('login-error').style.opacity="1"; }
        function logout() { sessionStorage.clear(); location.reload(); }
        function initApp() { fetchHomeBooks(); renderCategoryButtons(); renderUploadDropdown(); }

        // --- FETCHERS ---
        async function fetchHomeBooks() {
            const list = document.getElementById('home-list');
            const { data } = await getClient("Home").client.from('books').select('*').order('created_at', {ascending: false});
            booksCache = data || [];
            list.innerHTML = '';
            if(data) data.forEach(b => list.innerHTML += getRowHTML(b, 'Global'));
        }

        async function fetchDailyBooks() {
            const list = document.getElementById('daily-list');
            const { data } = await getClient("Daily").client.from('books').select('*').order('created_at', {ascending: false});
            booksCache = data || []; // Update cache for Daily view too
            document.getElementById('daily-count').innerText = data ? data.length : 0;
            list.innerHTML = '';
            if(data) data.forEach(b => list.innerHTML += getRowHTML(b, 'Daily'));
        }

        async function fetchCategoryData(key) {
            const list = document.getElementById('cat-detail-list');
            list.innerHTML = '<div class="p-10 text-center text-slate-400">Loading...</div>';
            const { data } = await getClient(key).client.from('books').select('*').order('created_at', {ascending: false});
            booksCache = data || []; // Update cache for category view
            list.innerHTML = '';
            if(data) data.forEach(b => list.innerHTML += getRowHTML(b, key));
        }

        function getRowHTML(b, type) {
            let delFunc = `delGlobal(${b.id})`;
            if(type === 'Daily') delFunc = `delDaily(${b.id})`;
            else if(type !== 'Global') delFunc = `delLocal(${b.id}, '${type}')`;

            return `<div class="grid grid-cols-[50px_1fr_80px] gap-4 p-4 border-b border-slate-50 items-center hover:bg-slate-50 transition-colors">
                <img src="${b.poster_url || 'https://via.placeholder.com/50'}" class="w-10 h-12 object-cover rounded-lg bg-slate-100">
                <div class="min-w-0">
                    <h4 class="font-bold text-sm text-slate-700 truncate">${b.title}</h4>
                    <p class="text-[11px] text-slate-400 truncate">${b.description || '-'}</p>
                </div>
                <div class="flex justify-end gap-2">
                    <button onclick="openEdit(${b.id}, '${type}')" class="h-8 w-8 rounded-full bg-white border border-slate-200 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                    <button onclick="${delFunc}" class="h-8 w-8 rounded-full bg-white border border-slate-200 text-red-500 flex items-center justify-center"><i class="fa-solid fa-trash text-xs"></i></button>
                </div>
            </div>`;
        }

        // --- GLOBAL DELETE WITH PROMISE.ALL (FIXED) ---
        async function delGlobal(id) {
            const book = booksCache.find(b => b.id == id);
            if(!book) return alert("System Error: Reload page.");
            
            if(!confirm(`⚠️ CONFIRM: Delete "${book.title}" from ALL 14 databases?`)) return;

            // 1. Delete from Master (Home)
            await getClient("Home").client.from('books').delete().eq('id', id);

            // 2. Prepare Parallel Deletes for ALL others based on Title
            const deletePromises = [];
            
            // Daily
            deletePromises.push(getClient("Daily").client.from('books').delete().eq('title', book.title));
            
            // All Categories
            for (const key in DB_CONFIG) {
                if(key !== "Home" && key !== "Daily") {
                    deletePromises.push(getClient(key).client.from('books').delete().eq('title', book.title));
                }
            }

            // 3. WAIT for all to finish
            await Promise.all(deletePromises);
            
            fetchHomeBooks(); // Refresh List
        }

        async function delDaily(id) {
            if(!confirm("Delete from Daily list only?")) return;
            await getClient("Daily").client.from('books').delete().eq('id', id);
            fetchDailyBooks();
        }

        async function delLocal(id, key) {
            if(!confirm(`Delete from ${key} only?`)) return;
            await getClient(key).client.from('books').delete().eq('id', id);
            fetchCategoryData(key);
        }

        // --- UPLOAD ---
        async function upload() {
            const btn = document.getElementById('btn-upload-action');
            const orgHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.classList.add('opacity-70', 'pointer-events-none');

            const title = document.getElementById('in-title').value;
            const link = document.getElementById('in-link').value;
            const category = document.getElementById('selected-category-value').value;

            if(!title || !link || !category) {
                alert("Missing Fields");
                btn.innerHTML = orgHTML; btn.classList.remove('opacity-70', 'pointer-events-none');
                return;
            }

            const bookData = { title, description: document.getElementById('in-desc').value, poster_url: document.getElementById('in-poster').value, book_url: link };

            try {
                // Use Promise.all to prevent redirect before completion
                await Promise.all([
                    getClient("Daily").client.from('books').insert([bookData]),
                    getClient("Home").client.from('books').insert([bookData]),
                    getClient(category).client.from('books').insert([bookData])
                ]);
                
                alert("✅ Uploaded!");
                
                document.getElementById('in-title').value = '';
                document.getElementById('in-poster').value = '';
                document.getElementById('in-link').value = '';
                document.getElementById('in-desc').value = '';
                document.getElementById('cat-display-text').innerText = 'Select Category';
                document.getElementById('cat-display-text').classList.replace('text-indigo-600', 'text-slate-400');
                document.getElementById('selected-category-value').value = '';
                
                fetchDailyBooks();
                
            } catch(e) { alert("Error"); }
            
            btn.innerHTML = orgHTML; btn.classList.remove('opacity-70', 'pointer-events-none');
        }

        // --- EDIT ---
        let editContextCategory = null; 
        function openEdit(id, contextKey) {
            const book = booksCache.find(b => b.id == id);
            if(book) {
                document.getElementById('edit-id').value = id;
                document.getElementById('edit-old-title').value = book.title;
                document.getElementById('edit-title').value = book.title;
                document.getElementById('edit-poster').value = book.poster_url;
                document.getElementById('edit-link').value = book.book_url;
                document.getElementById('edit-desc').value = book.description;
                editContextCategory = contextKey; 
                document.getElementById('edit-modal').classList.remove('hidden');
            }
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const oldTitle = document.getElementById('edit-old-title').value;
            const updates = { 
                title: document.getElementById('edit-title').value, 
                poster_url: document.getElementById('edit-poster').value, 
                book_url: document.getElementById('edit-link').value, 
                description: document.getElementById('edit-desc').value 
            };

            const btn = document.querySelector('#edit-modal button:last-child');
            btn.innerText = "Syncing...";

            try {
                // Global Update with Promise.all
                const promises = [];
                promises.push(getClient("Home").client.from('books').update(updates).eq('title', oldTitle));
                
                for (const key in DB_CONFIG) {
                    promises.push(getClient(key).client.from('books').update(updates).eq('title', oldTitle));
                }
                
                await Promise.all(promises);
                
                alert("Global Sync Sent!");
                closeEdit();
                
                if(editContextCategory === 'Global') fetchHomeBooks();
                else if(editContextCategory === 'Daily') fetchDailyBooks();
                else fetchCategoryData(editContextCategory);
                
            } catch(e) { alert(e.message); }
            btn.innerText = "Save";
        }

        function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }

        // --- UI HELPERS ---
        function switchTab(tab) {
            ['view-home','view-daily','view-categories'].forEach(id=>document.getElementById(id).classList.add('hidden-force'));
            ['btn-home','btn-daily','btn-categories'].forEach(id=>document.getElementById(id).classList.remove('active'));
            document.getElementById('view-'+tab).classList.remove('hidden-force');
            document.getElementById('btn-'+tab).classList.add('active');
            if(tab==='home') fetchHomeBooks(); if(tab==='daily') fetchDailyBooks(); if(tab==='categories') closeCategory();
        }
        function renderCategoryButtons() {
            const grid = document.getElementById('cat-grid'); grid.innerHTML = '';
            for(const key in DB_CONFIG) if(key!=='Home' && key!=='Daily') grid.innerHTML += `<div class="cat-card" onclick="openCategory('${key}')"><div class="cat-icon"><i class="fa-solid fa-${DB_CONFIG[key].icon}"></i></div><span class="text-sm font-bold text-slate-700">${key}</span></div>`;
        }
        function renderUploadDropdown() {
            const popup = document.getElementById('upload-cat-popup'); popup.innerHTML = '';
            for(const key in DB_CONFIG) if(key!=='Home' && key!=='Daily') popup.innerHTML += `<div class="cat-item" onclick="selectUploadCat('${key}')">${key}</div>`;
        }
        function selectUploadCat(val) {
            document.getElementById('selected-category-value').value=val;
            document.getElementById('cat-display-text').innerText=val;
            document.getElementById('cat-display-text').classList.replace('text-slate-400','text-indigo-600');
            document.getElementById('upload-cat-popup').classList.remove('active');
        }
        function openCategory(key) {
            document.getElementById('cat-hub-container').classList.add('hidden-force');
            document.getElementById('cat-detail-container').classList.remove('hidden-force');
            document.getElementById('active-cat-title').innerText=key;
            fetchCategoryData(key);
        }
        function closeCategory() {
            document.getElementById('cat-hub-container').classList.remove('hidden-force');
            document.getElementById('cat-detail-container').classList.add('hidden-force');
        }
    </script>
</body>
</html>
